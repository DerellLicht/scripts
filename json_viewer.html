<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JSON Viewer — readable strings (build 2026-07-18e: overview/summary collapse)</title>
<style>
  :root {
    --bg: #1e1e1e;
    --panel: #252526;
    --border: #3a3a3a;
    --text: #d4d4d4;
    --dim: #808080;
    --key: #9cdcfe;
    --string: #ce9178;
    --num: #b5cea8;
    --bool: #569cd6;
    --null: #808080;
    --punct: #808080;
    --accent: #4ec9b0;
    --hit: #6b5b1a;
  }
  * { box-sizing: border-box; }
  html, body {
    height: 100%; margin: 0;
    background: var(--bg); color: var(--text);
    font-family: Consolas, "Courier New", monospace;
    font-size: 13.5px;
  }
  #dropzone {
    height: 100%; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px; text-align: center; padding: 40px;
  }
  #dropzone.hidden { display: none; }
  #dropzone h1 { font-size: 18px; font-weight: 600; color: var(--text); margin: 0; }
  #dropzone p { color: var(--dim); margin: 0; max-width: 480px; line-height: 1.5; }
  #dropzone .box {
    border: 2px dashed var(--border); border-radius: 8px;
    padding: 48px 60px; transition: border-color .15s, background .15s;
  }
  #dropzone .box.drag { border-color: var(--accent); background: #26332f; }
  #filepick {
    background: var(--accent); color: #12211d; border: none; border-radius: 5px;
    padding: 8px 16px; font-family: inherit; font-size: 13.5px; font-weight: 600;
    cursor: pointer; margin-top: 4px;
  }
  #filepick:hover { filter: brightness(1.08); }

  #app { display: none; height: 100%; flex-direction: column; }
  #app.active { display: flex; }

  #toolbar {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; background: var(--panel); border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #toolbar .fname { color: var(--accent); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 260px; }
  #toolbar input[type=text] {
    flex: 1; background: #1a1a1a; border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); padding: 5px 9px; font-family: inherit; font-size: 13px;
  }
  #toolbar input[type=text]:focus { outline: 1px solid var(--accent); }
  #toolbar button {
    background: #333; color: var(--text); border: 1px solid var(--border); border-radius: 4px;
    padding: 5px 10px; font-family: inherit; font-size: 12.5px; cursor: pointer; white-space: nowrap;
  }
  #toolbar button:hover { background: #3d3d3d; }
  #matchcount { color: var(--dim); font-size: 12px; min-width: 70px; }

  #tree {
    flex: 1; overflow: auto; padding: 10px 14px 40px 10px;
  }

  .node { position: relative; }
  .row {
    display: flex; align-items: flex-start; gap: 4px; padding: 1px 0;
    border-radius: 3px;
  }
  .row:hover { background: #2a2d2e; }
  .toggle {
    width: 14px; flex-shrink: 0; text-align: center; cursor: pointer;
    color: var(--dim); user-select: none; margin-top: 1px;
  }
  .toggle.leaf { visibility: hidden; cursor: default; }
  .key { color: var(--key); flex-shrink: 0; }
  .punct { color: var(--punct); }
  .meta { color: var(--dim); font-style: italic; margin-left: 4px; cursor: pointer; }
  .subtree-btn {
    color: var(--dim); margin-left: 6px; cursor: pointer; user-select: none;
    border: 1px solid var(--border); border-radius: 3px; padding: 0 4px; font-size: 11px;
  }
  .subtree-btn:hover { color: var(--accent); border-color: var(--accent); }
  .val-string {
    color: var(--string); white-space: pre-wrap; word-break: break-word;
    line-height: 1.45;
  }
  .val-number { color: var(--num); }
  .val-bool { color: var(--bool); }
  .val-null { color: var(--null); }
  .children { margin-left: 18px; border-left: 1px dotted #444; padding-left: 8px; }
  .children.collapsed { display: none; }
  .placeholder { color: var(--dim); cursor: pointer; }
  mark { background: var(--hit); color: inherit; border-radius: 2px; }

  #status { padding: 6px 12px; color: var(--dim); font-size: 12px; border-top: 1px solid var(--border); flex-shrink: 0; }
</style>
</head>
<body>

<div id="dropzone">
  <div class="box" id="dropbox">
    <h1>Drop a .json file here</h1>
    <p>Runs entirely in your browser — nothing is uploaded anywhere. String values containing <code>\n</code> are rendered as real line breaks instead of one unreadable wall of text.</p>
    <input type="file" id="filepick" accept=".json,application/json" style="display:none">
    <button id="filepickbtn" style="margin-top:10px; background:var(--accent); color:#12211d; border:none; border-radius:5px; padding:8px 16px; font-family:inherit; font-size:13.5px; font-weight:600; cursor:pointer;">Choose file…</button>
  </div>
</div>

<div id="app">
  <div id="toolbar">
    <span class="fname" id="fname"></span>
    <input type="text" id="search" placeholder="Search keys and values… (Enter = next, Shift+Enter = prev)">
    <span id="matchcount"></span>
    <button id="expandall">Expand all</button>
    <button id="collapseall">Collapse all</button>
    <button id="newfile">Open another file</button>
  </div>
  <div id="tree"></div>
  <div id="status"></div>
</div>

<script>
(function () {
  const dropzone = document.getElementById('dropzone');
  const dropbox = document.getElementById('dropbox');
  const filepick = document.getElementById('filepick');
  const filepickbtn = document.getElementById('filepickbtn');
  const app = document.getElementById('app');
  const treeEl = document.getElementById('tree');
  const fnameEl = document.getElementById('fname');
  const statusEl = document.getElementById('status');
  const searchEl = document.getElementById('search');
  const matchcountEl = document.getElementById('matchcount');

  let data = null;
  let matches = [];
  let matchIdx = -1;

  // Field names matching this are treated as summary/overview text: collapsed by
  // default, click (or right-click / ⤢ on an ancestor) to reveal. If your JSON
  // uses a different key name for this, tell me and I'll adjust the pattern.
  const OVERVIEW_KEY_RE = /overview|summary/i;

  function loadFile(file) {
    const reader = new FileReader();
    reader.onload = () => {
      let parsed;
      try {
        parsed = JSON.parse(reader.result);
      } catch (e) {
        alert('Could not parse this as JSON:\n' + e.message);
        return;
      }
      data = parsed;
      fnameEl.textContent = file.name;
      dropzone.classList.add('hidden');
      app.classList.add('active');
      render();
    };
    reader.onerror = () => alert('Could not read file.');
    reader.readAsText(file);
  }

  ['dragenter', 'dragover'].forEach(ev =>
    dropbox.addEventListener(ev, e => { e.preventDefault(); dropbox.classList.add('drag'); }));
  ['dragleave', 'drop'].forEach(ev =>
    dropbox.addEventListener(ev, e => { e.preventDefault(); dropbox.classList.remove('drag'); }));
  dropbox.addEventListener('drop', e => {
    const f = e.dataTransfer.files[0];
    if (f) loadFile(f);
  });
  filepickbtn.addEventListener('click', () => filepick.click());
  filepick.addEventListener('change', () => { if (filepick.files[0]) loadFile(filepick.files[0]); });

  document.getElementById('newfile').addEventListener('click', () => {
    app.classList.remove('active');
    dropzone.classList.remove('hidden');
    treeEl.innerHTML = '';
    searchEl.value = '';
    matches = []; matchIdx = -1; matchcountEl.textContent = '';
  });

  function typeOf(v) {
    if (v === null) return 'null';
    if (Array.isArray(v)) return 'array';
    return typeof v; // object, string, number, boolean
  }

  function countNodes(v) {
    let n = 1;
    if (Array.isArray(v)) v.forEach(x => n += countNodes(x));
    else if (v && typeof v === 'object') Object.values(v).forEach(x => n += countNodes(x));
    return n;
  }

  // Build DOM lazily for large files: children render on first expand.
  function buildValueNode(value, keyLabel, isLast, autoExpand) {
    const node = document.createElement('div');
    node.className = 'node';
    const type = typeOf(value);
    const row = document.createElement('div');
    row.className = 'row';

    const toggle = document.createElement('span');
    toggle.className = 'toggle';
    row.appendChild(toggle);

    if (keyLabel !== null) {
      const keySpan = document.createElement('span');
      keySpan.className = 'key';
      keySpan.textContent = '"' + keyLabel + '"';
      row.appendChild(keySpan);
      const colon = document.createElement('span');
      colon.className = 'punct';
      colon.textContent = ': ';
      row.appendChild(colon);
    }

    if (type === 'object' || type === 'array') {
      const entries = type === 'array' ? value.map((v, i) => [i, v]) : Object.entries(value);
      const openChar = type === 'array' ? '[' : '{';
      const closeChar = type === 'array' ? ']' : '}';

      if (entries.length === 0) {
        toggle.classList.add('leaf');
        const p = document.createElement('span');
        p.className = 'punct';
        p.textContent = openChar + closeChar;
        row.appendChild(p);
      } else {
        const openSpan = document.createElement('span');
        openSpan.className = 'punct';
        openSpan.textContent = openChar;
        row.appendChild(openSpan);

        const meta = document.createElement('span');
        meta.className = 'meta';
        meta.textContent = entries.length + (type === 'array' ? ' items' : ' keys');
        row.appendChild(meta);

        const closeSpan = document.createElement('span');
        closeSpan.className = 'punct';
        closeSpan.style.display = 'none';
        closeSpan.textContent = closeChar;

        const childWrap = document.createElement('div');
        childWrap.className = 'children collapsed';

        let built = false;
        function build() {
          if (built) return;
          built = true;
          entries.forEach(([k, v], i) => {
            childWrap.appendChild(buildValueNode(v, type === 'array' ? null : k, i === entries.length - 1, false));
          });
        }

        function setExpanded(exp) {
          if (exp) build();
          childWrap.classList.toggle('collapsed', !exp);
          toggle.textContent = exp ? '▾' : '▸';
          meta.style.display = exp ? 'none' : '';
          closeSpan.style.display = exp ? '' : 'none';
        }
        toggle.addEventListener('click', () => setExpanded(childWrap.classList.contains('collapsed')));
        row.appendChild(closeSpan);

        const subtreeBtn = document.createElement('span');
        subtreeBtn.className = 'subtree-btn';
        subtreeBtn.textContent = '⤢';
        subtreeBtn.title = 'Expand/collapse this entry and everything under it (right-click also works)';
        row.appendChild(subtreeBtn);
        subtreeBtn.addEventListener('click', e => {
          e.stopPropagation();
          expandSubtree(node, childWrap.classList.contains('collapsed'));
        });
        row.addEventListener('contextmenu', e => {
          e.preventDefault();
          e.stopPropagation();
          expandSubtree(node, childWrap.classList.contains('collapsed'));
        });

        node._setExpanded = setExpanded;
        node._entries = entries;
        node.appendChild(row);
        node.appendChild(childWrap);
        setExpanded(!!autoExpand);
        if (!isLast) row.appendChild(trailingComma());
        return node;
      }
    } else if (type === 'string' && keyLabel !== null && OVERVIEW_KEY_RE.test(String(keyLabel))) {
      // Summary/overview-style text field: collapsed by default, click to reveal.
      // Body lives in its own block below the row (like containers do) so the row
      // itself stays compact and the toggle/button sit right next to the label.
      const placeholder = document.createElement('span');
      placeholder.className = 'placeholder';
      placeholder.textContent = '▸ ' + value.length.toLocaleString() + ' chars — click to expand';
      row.appendChild(placeholder);

      const overviewBtn = document.createElement('span');
      overviewBtn.className = 'subtree-btn';
      overviewBtn.textContent = '⤢';
      overviewBtn.title = 'Expand/collapse this field (right-click also works)';
      row.appendChild(overviewBtn);

      const bodyWrap = document.createElement('div');
      bodyWrap.className = 'children collapsed';
      const full = document.createElement('span');
      full.className = 'val-string';
      full.textContent = value;
      bodyWrap.appendChild(full);

      function setExpanded(exp) {
        bodyWrap.classList.toggle('collapsed', !exp);
        placeholder.style.display = exp ? 'none' : '';
        toggle.textContent = exp ? '▾' : '▸';
      }
      toggle.addEventListener('click', () => setExpanded(bodyWrap.classList.contains('collapsed')));
      placeholder.addEventListener('click', () => setExpanded(true));
      overviewBtn.addEventListener('click', e => {
        e.stopPropagation();
        setExpanded(bodyWrap.classList.contains('collapsed'));
      });
      row.addEventListener('contextmenu', e => {
        e.preventDefault();
        e.stopPropagation();
        setExpanded(bodyWrap.classList.contains('collapsed'));
      });

      node._setExpanded = setExpanded;
      node._isOverview = true; // exempt from forced-open by "expand this thread"; still respects manual toggle and Collapse all
      node.appendChild(row);
      node.appendChild(bodyWrap);
      setExpanded(!!autoExpand);
      if (!isLast) row.appendChild(trailingComma());
      return node;
    } else {
      toggle.classList.add('leaf');
      row.appendChild(renderScalar(value, type));
    }

    node.appendChild(row);
    if (!isLast) row.appendChild(trailingComma());
    return node;
  }

  function trailingComma() {
    const c = document.createElement('span');
    c.className = 'punct';
    c.textContent = ',';
    return c;
  }

  function renderScalar(value, type) {
    const span = document.createElement('span');
    if (type === 'string') {
      span.className = 'val-string';
      span.textContent = value; // JSON.parse already turned \n into a real newline char
    } else if (type === 'number') {
      span.className = 'val-number';
      span.textContent = String(value);
    } else if (type === 'boolean') {
      span.className = 'val-bool';
      span.textContent = String(value);
    } else {
      span.className = 'val-null';
      span.textContent = 'null';
    }
    return span;
  }

  // Expand (or collapse) a node and every expandable node beneath it.
  // Works on any node in the tree, e.g. a single top-level conversation entry.
  function expandSubtree(n, exp) {
    if (!n || !n._setExpanded) return;
    if (n._isOverview && exp) return; // "expand this thread" shouldn't force the summary open too
    n._setExpanded(exp);
    const childWrap = n.querySelector(':scope > .children');
    if (childWrap) {
      Array.from(childWrap.children).forEach(child => expandSubtree(child, exp));
    }
  }

  function render() {
    treeEl.innerHTML = '';
    const root = buildValueNode(data, null, true, true);
    treeEl.appendChild(root);
    const n = countNodes(data);
    statusEl.textContent = n.toLocaleString() + ' nodes loaded. Right-click any expandable entry (or click its ⤢) to expand/collapse just that branch. [build 2026-07-18e]';
  }

  document.getElementById('expandall').addEventListener('click', () => {
    treeEl.querySelectorAll('.node').forEach(n => { if (n._setExpanded) n._setExpanded(true); });
  });
  document.getElementById('collapseall').addEventListener('click', () => {
    treeEl.querySelectorAll('.node').forEach(n => { if (n._setExpanded) n._setExpanded(false); });
    const root = treeEl.firstChild;
    if (root && root._setExpanded) root._setExpanded(true);
  });

  // --- Search ---------------------------------------------------------
  function clearHighlights() {
    treeEl.querySelectorAll('mark').forEach(m => {
      const parent = m.parentNode;
      parent.replaceChild(document.createTextNode(m.textContent), m);
      parent.normalize();
    });
  }

  function expandAncestors(el) {
    let n = el.closest('.children');
    while (n) {
      n.classList.remove('collapsed');
      const parentNode = n.parentElement.closest('.node');
      if (parentNode && parentNode._setExpanded) {
        const toggle = parentNode.querySelector(':scope > .row > .toggle');
        if (toggle) toggle.textContent = '▾';
        const meta = parentNode.querySelector(':scope > .row > .meta');
        if (meta) meta.style.display = 'none';
      }
      n = n.parentElement ? n.parentElement.closest('.children') : null;
    }
  }

  function doSearch(term) {
    clearHighlights();
    matches = []; matchIdx = -1;
    if (!term) { matchcountEl.textContent = ''; return; }
    // Expand everything first so text nodes exist in the DOM to search.
    treeEl.querySelectorAll('.node').forEach(n => { if (n._setExpanded) n._setExpanded(true); });
    const lower = term.toLowerCase();
    const walker = document.createTreeWalker(treeEl, NodeFilter.SHOW_TEXT, null);
    const textNodes = [];
    let tn;
    while ((tn = walker.nextNode())) {
      if (tn.parentElement.tagName === 'MARK') continue;
      if (tn.nodeValue.toLowerCase().includes(lower)) textNodes.push(tn);
    }
    textNodes.forEach(tn => {
      const text = tn.nodeValue;
      const lowerText = text.toLowerCase();
      const frag = document.createDocumentFragment();
      let last = 0, idx;
      while ((idx = lowerText.indexOf(lower, last)) !== -1) {
        if (idx > last) frag.appendChild(document.createTextNode(text.slice(last, idx)));
        const mark = document.createElement('mark');
        mark.textContent = text.slice(idx, idx + term.length);
        frag.appendChild(mark);
        matches.push(mark);
        last = idx + term.length;
      }
      if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
      tn.parentNode.replaceChild(frag, tn);
    });
    matchcountEl.textContent = matches.length ? ('1 / ' + matches.length) : 'no matches';
    if (matches.length) goToMatch(0);
  }

  function goToMatch(i) {
    if (!matches.length) return;
    matchIdx = (i + matches.length) % matches.length;
    matches.forEach(m => m.style.outline = '');
    const m = matches[matchIdx];
    m.style.outline = '1px solid var(--accent)';
    m.scrollIntoView({ block: 'center' });
    matchcountEl.textContent = (matchIdx + 1) + ' / ' + matches.length;
  }

  let searchTimer;
  searchEl.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => doSearch(searchEl.value.trim()), 250);
  });
  searchEl.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      if (e.shiftKey) goToMatch(matchIdx - 1); else goToMatch(matchIdx + 1);
    }
  });
})();
</script>
</body>
</html>
